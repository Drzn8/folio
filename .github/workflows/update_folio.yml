name: Auto-Update Portfolio Projects

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  refresh-portfolio-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout folio repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Execute Portfolio Generator Script
        env:
          PORTFOLIO_USERNAME: "Drzn8"
          CUSTOM_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python project_gen_bot/generate_projects.py

      - name: Sync and Commit Dynamic Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add projects.json
          
          if git diff --staged --quiet; then
            echo "No pipeline data alterations detected. Skipping deployment loop."
          else
            git commit -m "chore: automated refresh of projects.json [skip ci]"
            git push origin main
          
            echo "Portfolio metrics synchronized securely."
          fi